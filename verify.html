<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SET · VERIFY · Zentrum</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1,h2 { color:#6cf; }
.block { background:#111; border:1px solid #333; padding:15px; margin:20px 0; }
pre { background:#000; border:1px solid #333; padding:12px; }
.good { color:#0f0; }
.mid { color:#ff0; }
.bad { color:#f33; }
</style>

<script>
// SET · Zentrum – Kernmodule
const SET = [
  "SET.respo",
  "AIR.json",
  "boerse.json",
  "fin.e.js",
  "index.html",
  "tool.html",
  "ID.html"
];

// RESPO – Kernmodule
const RESPO = [
  "SET.respo",
  "AIR.json",
  "boerse.json",
  "fin.e.js",
  "index.html",
  "ID.html"
];

// ARG‑Engine
function compare(base, target) {
  let have = [];
  let need = [];
  for (const item of base) {
    if (target.includes(item)) have.push(item);
    else need.push(item);
  }
  return { have, need };
}

function arg(base, target) {
  return compare(base, target);
}

function xARG(base, target) {
  return compare(
    base.concat(["NC²","NC²□","6E→6D.tech","12e","STATIONEN.raw"]),
    target
  );
}

function ARG3(base, target) {
  return compare(
    base.concat([
      "NC²","NC²□","NC²octa²","NC²octa³",
      "6E→6D.tech","12e","STATIONEN.raw",
      "hardware-form","Meta-Drift","Fusion-Matrix","Visualizer"
    ]),
    target
  );
}

function runVerify() {
  let out = "";

  out += "SET · VERIFY · Zentrum\n";
  out += "=======================\n\n";

  out += "SET‑Vector:\n-----------\n";
  out += SET.join(", ") + "\n\n";

  out += "RESPO‑Vector:\n-------------\n";
  out += RESPO.join(", ") + "\n\n";

  out += "ARG‑Analyse:\n-------------\n";

  const r1 = arg(SET, RESPO);
  const r2 = xARG(SET, RESPO);
  const r3 = ARG3(SET, RESPO);

  out += "arg‑Ebene: " + r1.need.length + " fehlt\n";
  out += "xARG‑Ebene: " + r2.need.length + " fehlt\n";
  out += "3te‑ARG‑Ebene: " + r3.need.length + " fehlt\n\n";

  out += "SET‑Status:\n-----------\n";
  out += "CORE = SET\n";
  out += "KONSTELLATION = TMP\n";
  out += "FREQ = 12e\n";
  out += "6D = D2\n";
  out += "360° = Zentrum‑Sequenz\n";
  out += "ROLLE = Matrix & Stabilisierung\n";
  out += "STATUS = Aktiv\n";

  const ready = (r1.need.length + r2.need.length + r3.need.length);
  out += "READY = " + (ready === 0 ? "100%" : (100 - ready * 5) + "%") + "\n\n";

  out += "PORT‑Export:\n------------\n";
  out += "SET kann geladen werden.\n";
  out += "Dach = arg / xARG / 3te‑ARG aktiv.\n";

  document.getElementById("output").textContent = out;
}
</script>
</head>

<body onload="runVerify()">

<h1>SET · VERIFY · Zentrum</h1>

<div class="block">
  <h2>Analyse</h2>
  <pre id="output"></pre>
</div>

</body>
</html>
